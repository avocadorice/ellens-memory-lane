<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>html,body{margin:0;padding:0;overflow:hidden}canvas{display:block}</style>
</head>
<body>
<canvas id="c" width="512" height="512"></canvas>
<!-- assets.js expects a window; it's fully procedural for drawEllen -->
<script src="../assets.js"></script>
<script>
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');

  // --- Soft warm background (matches the game's peachy palette) ---
  const g = ctx.createRadialGradient(256, 230, 40, 256, 256, 360);
  g.addColorStop(0, '#ffe9db');
  g.addColorStop(1, '#ffc6a3');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, 512, 512);

  // --- Ellen's head only ---
  // Head local center is (0,-58); skin r=13, hair dome to ~-74, side locks +/-18.
  // Bypass the sprite cache (would clip at high scale) by calling _drawEllenDirect.
  const scale = 13;
  const headLocalY = -58;
  const X = 256;
  const Y = 256 - headLocalY * scale;   // put head center at canvas center
  Assets._drawEllenDirect(ctx, X, Y, 'casual', 0, 1, scale, false);

  // Signal done for the screenshot tooling
  document.title = 'ICON_READY';
</script>
</body>
</html>
