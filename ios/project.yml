# XcodeGen spec — the iOS counterpart to android/app/build.gradle.
# Generate the Xcode project with:  cd ios && xcodegen generate
# (brew install xcodegen), then open EllensMemoryLane.xcodeproj.
name: EllensMemoryLane
options:
  bundleIdPrefix: com.ellensmemorylane
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

targets:
  EllensMemoryLane:
    type: application
    platform: iOS
    sources:
      - path: EllensMemoryLane
        excludes:
          - "Info.plist"
    settings:
      base:
        # Use the hand-written Info.plist rather than letting Xcode generate one.
        INFOPLIST_FILE: EllensMemoryLane/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_BUNDLE_IDENTIFIER: com.ellensmemorylane.ios
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        # Phones (1) and iPads (2).
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        # Add an icon set under EllensMemoryLane/Assets.xcassets and then set
        # ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon here (see README).
